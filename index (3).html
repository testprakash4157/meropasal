<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Management System</title>
    <style>
        :root { --currency: "Rs. "; }
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f6f9; color: #333; }
        .navbar { display: flex; gap: 10px; background: #2c3e50; padding: 10px; border-radius: 5px; }
        .navbar button { background: #34495e; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 3px; }
        .navbar button:hover { background: #1abc9c; }
        .tab-content { display: none; background: white; padding: 20px; margin-top: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .active { display: block; }
        form { display: grid; gap: 10px; max-width: 400px; }
        input, select, textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button.submit-btn { background: #27ae60; color: white; border: none; padding: 10px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        
        /* Print Styles: Configured for dual copy printing */
        @media print {
            body * { display: none; }
            #print-area, #print-area * { display: block; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .print-copy { page-break-after: always; border-bottom: 2px dashed #000; padding-bottom: 40px; margin-bottom: 40px; }
            .print-copy:last-child { page-break-after: avoid; border: none; }
        }
    </style>
</head>
<body>

    <h2>Shop Management System (Nepal)</h2>
    <div class="navbar">
        <button onclick="showTab('sales-tab')">Sales Entry</button>
        <button onclick="showTab('purchase-tab')">Purchase Entry</button>
        <button onclick="showTab('daybook-tab')">Daybook</button>
        <button onclick="showTab('ledger-tab')">Party Ledger & Dues</button>
        <button onclick="showTab('notes-tab')">Notes</button>
    </div>

    <div id="sales-tab" class="tab-content active">
        <h3>Sales Invoice Entry</h3>
        <form id="sales-form" onsubmit="saveData(event, 'Sales', this)">
            <input type="text" name="Invoice_No" placeholder="Invoice Number" required>
            <input type="date" name="Date" required>
            <input type="text" name="Party_Name" placeholder="Customer Name" required>
            <input type="number" name="Total_Amount" placeholder="Total Amount" required>
            <button type="submit" class="submit-btn">Save & Print 2 Copies</button>
        </form>
    </div>

    <div id="purchase-tab" class="tab-content">
        <h3>Purchase Bill Entry</h3>
        <form id="purchase-form" onsubmit="saveData(event, 'Purchases', this)">
            <input type="text" name="Bill_No" placeholder="Bill Number" required>
            <input type="date" name="Date" required>
            <input type="text" name="Party_Name" placeholder="Supplier Name" required>
            <input type="number" name="Total_Amount" placeholder="Total Amount" required>
            <button type="submit" class="submit-btn">Save & Print 2 Copies</button>
        </form>
    </div>

    <div id="daybook-tab" class="tab-content">
        <h3>Daybook</h3>
        <label>Filter by Date: </label>
        <input type="date" id="daybook-filter" onchange="filterDaybook()">
        <button onclick="printElement('daybook-table-container', 'Daybook')">Print Daybook</button>
        <div id="daybook-table-container">
            <table id="daybook-table">
                <thead>
                    <tr><th>Date</th><th>Type</th><th>Particulars</th><th>Amount</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="ledger-tab" class="tab-content">
        <h3>Party Dues Management</h3>
        <div id="dues-summary"></div>
        
        <h3>Party Ledger</h3>
        <select id="party-select" onchange="generateLedger()"></select>
        <button onclick="printElement('ledger-table-container', 'Party Ledger')">Print Ledger</button>
        <div id="ledger-table-container">
            <table id="ledger-table">
                <thead>
                    <tr><th>Date</th><th>Type</th><th>Amount</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="notes-tab" class="tab-content">
        <h3>Quick Notes</h3>
        <form id="notes-form" onsubmit="saveData(event, 'Notes', this)">
            <textarea name="Note_Content" placeholder="Write note here..." required></textarea>
            <button type="submit" class="submit-btn">Save Note</button>
        </form>
    </div>

    <div id="print-area"></div>

    <script>
        // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
        const API_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL"; 
        let database = {};

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        // Real-time data pull
        async function pullData() {
            try {
                let response = await fetch(`${API_URL}?action=getData`);
                database = await response.json();
                renderDaybook();
                populateParties();
            } catch (err) { console.log("Database Syncing...", err); }
        }

        // Auto-save data
        async function saveData(e, sheetName, form) {
            e.preventDefault();
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // Optimistic UI saving locally first
            if(!database[sheetName]) database[sheetName] = [];
            database[sheetName].push(data);
            
            // Print execution for Transactions/Invoices
            if(sheetName === 'Sales' || sheetName === 'Purchases') {
                triggerDoublePrint(data, sheetName);
            }

            form.reset();

            // Send payload to Google Sheets
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "addData", sheet: sheetName, data: data })
            });
            
            pullData(); // Refresh system values
        }

        // 2 Copies Printing Mechanism (Original + Duplicate)
        function triggerDoublePrint(data, type) {
            const printArea = document.getElementById('print-area');
            const title = type === 'Sales' ? 'INVOICE' : 'BILL';
            const amtKey = data.Total_Amount;

            let htmlContent = `
                <div style="padding:20px; text-align:center;">
                    <h2>${title}</h2>
                    <p>Party: ${data.Party_Name || data.Supplier_Name}</p>
                    <p>Date: ${data.Date}</p>
                    <h3>Total: Rs. ${amtKey}</h3>
                </div>
            `;

            printArea.innerHTML = `
                <div class="print-copy"><h2>ORIGINAL COPY</h2>${htmlContent}</div>
                <div class="print-copy"><h2>DUPLICATE COPY</h2>${htmlContent}</div>
            `;
            window.print();
        }

        function printElement(elementId, title) {
            const printArea = document.getElementById('print-area');
            printArea.innerHTML = `<h2>${title}</h2>` + document.getElementById(elementId).innerHTML;
            window.print();
        }

        function renderDaybook() {
            const tbody = document.querySelector("#daybook-table tbody");
            tbody.innerHTML = "";
            let rows = [...(database.Sales || []), ...(database.Purchases || [])];
            rows.forEach(item => {
                tbody.innerHTML += `<tr>
                    <td>${item.Date}</td>
                    <td>${item.Invoice_No ? 'Sales' : 'Purchase'}</td>
                    <td>${item.Party_Name}</td>
                    <td>Rs. ${item.Total_Amount}</td>
                </tr>`;
            });
        }

        function populateParties() {
            const select = document.getElementById('party-select');
            select.innerHTML = "";
            let parties = new Set([...(database.Sales || []).map(s => s.Party_Name), ...(database.Purchases || []).map(p => p.Party_Name)]);
            parties.forEach(party => {
                if(party) select.innerHTML += `<option value="${party}">${party}</option>`;
            });
        }

        function generateLedger() {
            const party = document.getElementById('party-select').value;
            const tbody = document.querySelector("#ledger-table tbody");
            tbody.innerHTML = "";
            let rows = [...(database.Sales || []), ...(database.Purchases || [])].filter(r => r.Party_Name === party);
            rows.forEach(item => {
                tbody.innerHTML += `<tr>
                    <td>${item.Date}</td>
                    <td>${item.Invoice_No ? 'Sales (Debit)' : 'Purchase (Credit)'}</td>
                    <td>Rs. ${item.Total_Amount}</td>
                </tr>`;
            });
        }

        // Run data pull interval every 10 seconds for real-time tracking
        setInterval(pullData, 10000);
        window.onload = pullData;
    </script>
</body>
</html>
